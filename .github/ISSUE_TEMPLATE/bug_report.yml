name: Bug report
description: Report a reproducible bug
title: "bug: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug.
        Please include a minimal reproducible case.

  - type: textarea
    id: actual_behavior
    attributes:
      label: Actual behavior
      description: What happened?
      placeholder: Describe the observed behavior.
    validations:
      required: true

  - type: textarea
    id: expected_behavior
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
      placeholder: Describe the expected behavior.
    validations:
      required: true

  - type: textarea
    id: reproduction_steps
    attributes:
      label: Reproduction steps
      description: Step-by-step instructions to reproduce.
      placeholder: |
        1. ...
        2. ...
        3. ...
    validations:
      required: true

  - type: input
    id: go_version
    attributes:
      label: Go version
      description: Output of `go version`.
      placeholder: go version go1.26.0 darwin/arm64
    validations:
      required: true

  - type: textarea
    id: executed_command
    attributes:
      label: Executed command
      description: Command(s) you ran when reproducing this issue.
      placeholder: |
        go test ./...
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, architecture, CI/local context, and any relevant details.
      placeholder: macOS 15, arm64, local run
    validations:
      required: false
